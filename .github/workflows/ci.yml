name: CI

on:
  push:
  pull_request:

jobs:
  php-syntax:
    name: PHP syntax (php -l)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
      - name: Lint all PHP files
        run: |
          find . -name '*.php' -not -path './.git/*' -print0 \
            | xargs -0 -r -n1 php -l

  json-validate:
    name: Validate module JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON (well-formed + required IPS keys)
        run: bash tests/validate-json.sh
